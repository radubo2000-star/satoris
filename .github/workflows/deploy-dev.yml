name: Deploy to cPanel (dev.satoris.ro)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.3
        with:
          server: ${{ secrets.CPANEL_FTP_SERVER }}
          username: ${{ secrets.CPANEL_FTP_USER }}
          password: ${{ secrets.CPANEL_FTP_PASS }}
          port: 21
          # Upload frontend dist to public root
          local-dir: frontend/dist/
          # Upload to /dev.satoris.ro/
          destination-dir: /dev.satoris.ro/
          # Delete files on server that don't exist locally
          dry-run: false

      - name: Deploy API to cPanel
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: ${{ secrets.CPANEL_FTP_SERVER }}
          username: ${{ secrets.CPANEL_FTP_USER }}
          password: ${{ secrets.CPANEL_FTP_PASS }}
          port: 21
          # Upload API files to /dev.satoris.ro/api/
          local-dir: backend/
          destination-dir: /dev.satoris.ro/api/
          dry-run: false
